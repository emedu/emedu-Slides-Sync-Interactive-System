<!-- UI_Action.html -->
<script>
    // 簡單的狀態管理
    const State = {
        studentId: null,
        currentTask: null // { label, question, ... }
    };

    const DOM = {
        loginCard: document.getElementById('loginCard'),
        contentArea: document.getElementById('contentArea'),
        studentIdInput: document.getElementById('studentId'),
        btnLogin: document.getElementById('btnLogin'),
        btnSubmit: document.getElementById('btnSubmit'),
        questionTitle: document.getElementById('questionTitle'),
        questionDesc: document.getElementById('questionDesc'),
        statusMessage: document.getElementById('statusMessage'),
        feedbackCard: document.getElementById('feedbackCard'),
        feedbackContent: document.getElementById('feedbackContent'),
        progressBar: document.getElementById('progressBar')
    };

    // --- 初始化事件 ---

    DOM.btnLogin.addEventListener('click', handleLogin);
    DOM.btnSubmit.addEventListener('click', handleSubmit);

    // --- 處理函式 ---

    function handleLogin() {
        const sid = DOM.studentIdInput.value.trim();
        if (!sid) {
            showMessage("請輸入學號", "error");
            return;
        }

        setLoading(true);
        DOM.statusMessage.style.display = 'none'; // 開始新操作前隱藏舊訊息

        // 呼叫後端 API
        google.script.run
            .withSuccessHandler((response) => {
                setLoading(false);
                if (response.status === 'success') {
                    State.studentId = sid;

                    // Handle Course Completion
                    if (response.completed) {
                        DOM.loginCard.style.display = 'none';
                        DOM.contentArea.style.display = 'block';
                        DOM.contentArea.innerHTML = `
                            <div class="card" style="text-align:center; padding:40px;">
                                <div class="card-title" style="color:var(--primary-color);">🎉 恭喜完成！</div>
                                <p style="font-size:1.2rem; color:#444;">${response.message}</p>
                                <div style="margin-top:20px; font-size:3rem;">🏆</div>
                            </div>
                        `;
                        return;
                    }

                    State.currentTask = response.task; // 儲存題目資訊
                    console.log("Task loaded:", response.task);

                    showMessage("登入成功！", "success");

                    // 切換畫面
                    DOM.loginCard.style.display = 'none';
                    DOM.contentArea.style.display = 'block';

                    // 載入題目
                    renderQuestion(response.task);
                } else {
                    showMessage("登入失敗：" + response.message, "error");
                }
            })
            .withFailureHandler((err) => {
                setLoading(false);
                showMessage("系統錯誤：" + err.message, "error");
            })
            .apiLogin(sid);
    }

    function handleSubmit() {
        const answer = document.getElementById('answerInput').value.trim();
        if (!answer) {
            showMessage("請輸入答案", "error");
            return;
        }

        if (!State.studentId || !State.currentTask) {
            showMessage("狀態錯誤，請重新登入", "error");
            return;
        }

        setLoading(true);

        // 呼叫後端 API
        google.script.run
            .withSuccessHandler((response) => {
                setLoading(false);
                if (response.status === 'success') {
                    showMessage("提交成功！", "success");

                    // 顯示回饋 (若後端有回傳 score 更好，目前先 stub)
                    DOM.feedbackCard.style.display = 'block';
                    DOM.feedbackContent.innerHTML = `<strong>需待人工或 AI 評分</strong><br>已儲存您的作答。`;

                    DOM.btnSubmit.disabled = true;
                    DOM.btnSubmit.innerText = "已完成";

                    // 更新進度條 (後端回傳 completedCount)
                    // 簡單模擬：每題 10%
                    const p = (response.progress || 0) * 10;
                    DOM.progressBar.style.width = p + "%";

                } else {
                    showMessage("提交失敗：" + response.message, "error");
                }
            })
            .withFailureHandler((err) => {
                setLoading(false);
                showMessage("連線錯誤：" + err.message, "error");
            })
            .apiSubmit(State.studentId, State.currentTask.stage, State.currentTask.question, answer);
    }

    function renderQuestion(task) {
        DOM.questionTitle.innerText = task.stage;
        let html = `<strong>${task.question}</strong>`;
        if (task.desc) html += `<br><span style="font-size:0.8rem; color:#666">${task.desc}</span>`;
        DOM.questionDesc.innerHTML = html;

        // 清空輸入
        document.getElementById('answerInput').value = "";

    }



    // --- 工具函式 ---

    function showMessage(msg, type) {
        DOM.statusMessage.innerHTML = (type === 'error' ? '⚠️ ' : '✅ ') + msg;
        DOM.statusMessage.className = 'message ' + type;
        DOM.statusMessage.style.display = 'block';

        if (type === 'error') {
            // 觸發震動效果
            DOM.loginCard.classList.add('shake');
            setTimeout(() => DOM.loginCard.classList.remove('shake'), 500);

            // 錯誤訊息不自動消失，直到下一次處理
        } else {
            setTimeout(() => {
                DOM.statusMessage.style.display = 'none';
            }, 4000);
        }
    }

    function setLoading(loading) {
        const btns = document.querySelectorAll('.btn');
        btns.forEach(b => {
            if (loading) {
                b.dataset.originalText = b.innerText;
                b.innerText = "處理中...";
                b.disabled = true;
            } else {
                b.innerText = b.dataset.originalText || b.innerText;
                b.disabled = false;
            }
        });
    }
</script>
