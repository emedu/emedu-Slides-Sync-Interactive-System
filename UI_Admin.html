<body>

    <div class="admin-header">
        <h1>emedu 教學管理中心</h1>
        <div style="opacity:0.8;">Admin CMS v10.2.0 • Slides Sync System</div>
    </div>

    <div class="nav-tabs" id="navTabs" style="display:none;">
        <div class="nav-tab active" data-tab="tabDashboard">🏠 儀表板</div>

        <div class="card">

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <a id="linkMaster" href="#" target="_blank" class="btn" style="background:#217346;">📊 開啟主控台</a>

    <!-- CMS -->
    <div id="tabCMS" class="tab-content">

                <label>選擇教學階段</label>
                <select id="cmsStageSelect"
                    style="width:100%; padding:15px; border-radius:12px; border:2px solid #eee;">

                </select>
                <input type="text" id="cmsNewStage" placeholder="輸入新階段名稱" style="display:none; margin-top:10px;" />

                            <option value="單選題">單選題</option>

                    </div>

                        <input type="number" id="cmsQScore" value="10" />

    <!-- Manual -->
    <div id="tabManual" class="tab-content">
        <div class="manual-view" id="manualContent">
            載入說明文件中...
        </div>
    </div>

    <!-- Tools -->
    <div id="tabTools" class="tab-content">

        <!-- 🎯 活動管理卡片 -->
        <div class="card" id="activityCard">
            <div class="card-title">🎯 活動管理</div>
            <div id="activityList" style="margin-bottom:20px;">
                <div style="color:#888;">載入活動清單中...</div>
            </div>
            <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                <input type="text" id="newActivityName" placeholder="輸入新活動名稱（如：2025秋季班）"
                    style="flex:1; min-width:200px;" />
                <button id="btnCreateActivity" class="btn"
                    style="width:auto; padding:12px 20px; background:var(--admin-primary); color:white;"
                    onclick="createActivity()">➕ 建立新活動</button>
            </div>
            <div id="activityMsg" class="message" style="display:none; margin-top:10px;"></div>
        </div>

        <div class="card">
            <div class="card-title">系統診斷與工具</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <div class="tool-btn" onclick="runDiagnostic()">
                    <span>🔍 執行系統診斷</span>
                </div>
                <div class="tool-btn" onclick="clearCache()">
                    <span>🧹 清除全域快取</span>
                </div>
            </div>
            <div id="diagnosticLog"
                style="margin-top:20px; background:#1a1a1a; color:#00ff00; padding:15px; border-radius:8px; display:none; font-family:monospace; font-size:0.85rem;">
            </div>
        </div>

        <div style="text-align:center; margin-top:40px;">
            <button onclick="location.reload()" class="btn"
                style="background:#666; width:auto; padding:10px 30px;">登出系統</button>
        </div>
    </div>

    <script>
        const State = { password: "" };

        // Tab Switching
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');

                // 特定 Tab 觸發動態讀取
                if (tab.dataset.tab === 'tabManual') loadManual();
                if (tab.dataset.tab === 'tabTools') loadActivities();
                if (tab.dataset.tab === 'tabCMS') loadStages();
            });
        });

        // Login Logic
        document.getElementById('btnLogin').addEventListener('click', () => {
            const pwd = document.getElementById('adminPassword').value;
            if (!pwd) return;

            setLoading('btnLogin', true);
            google.script.run
                .withSuccessHandler(res => {
                    setLoading('btnLogin', false);
                    if (res.status === 'success') {
                        State.password = pwd;
                        document.getElementById('loginOverlay').style.display = 'none';
                        document.getElementById('navTabs').style.display = 'flex';
                        initDashboard(res.data);
                    } else {
                        showMsg('loginMsg', res.message, 'error');
                    }
                })
                .withFailureHandler(err => {
                    setLoading('btnLogin', false);
                    showMsg('loginMsg', '系統崩潰：' + err.message, 'error');
                })
                .apiAdminLogin(pwd);
        });

        function initDashboard(data) {
            document.getElementById('statTotalUsers').innerText = data.totalStudents || 0;
            document.getElementById('statTodaySubmits').innerText = data.totalSubmissions || 0;
            document.getElementById('linkMaster').href = data.masterUrl;
            document.getElementById('linkData').href = data.masterUrl;
            loadStages();
            loadActivities();
        }

        function loadActivities() {
            google.script.run
                .withSuccessHandler(function (res) {
                    const container = document.getElementById('activityList');
                    if (res.status !== 'success') {
                        container.innerHTML = '<div style="color:red;">' + (res.message || '讀取失敗') + '</div>';
                        return;
                    }
                    const acts = res.activities || [];
                    const currentId = res.currentId || 'default';
                    if (acts.length === 0) {
                        container.innerHTML = '<div style="color:#888;">尚無任何活動</div>';
                        return;
                    }
                    container.innerHTML = acts.map(function (a) {
                        const isActive = a.isActive || a.id === currentId;
                        return '<div style="display:flex; align-items:center; justify-content:space-between; padding:12px; margin-bottom:8px; background:' + (isActive ? '#e8f5e9' : '#f8f9fa') + '; border-radius:10px; border:1px solid ' + (isActive ? '#a5d6a7' : '#eee') + ';">' +
                            '<div>' +
                            '<span style="font-weight:600;">' + (a.name || a.id) + '</span>' +
                            (isActive ? ' <span style="background:#4caf50; color:white; font-size:0.7rem; padding:2px 8px; border-radius:20px; margin-left:8px;">✅ 當前</span>' : '') +
                            '<div style="font-size:0.8rem; color:#888; margin-top:3px;">' + (a.configSheet || '') + ' | ' + (a.dataSheet || '') + '</div>' +
                            '</div>' +
                            (!isActive ? '<button onclick="switchActivity(\'' + a.id + '\')" style="padding:6px 14px; border-radius:8px; border:1px solid #1a2a6c; background:white; color:#1a2a6c; cursor:pointer; font-size:0.85rem;">切換</button>' : '') +
                            '</div>';
                    }).join('');
                })
                .withFailureHandler(function (err) {
                    document.getElementById('activityList').innerHTML = '<div style="color:red;">錯誤：' + err.message + '</div>';
                })
                .apiGetActivityList(State.password);
        }

        function createActivity() {
            const name = document.getElementById('newActivityName').value.trim();
            if (!name) { showMsg('activityMsg', '請輸入活動名稱！', 'error'); return; }
            setLoading('btnCreateActivity', true);
            google.script.run
                .withSuccessHandler(function (res) {
                    setLoading('btnCreateActivity', false);
                    showMsg('activityMsg', res.message, res.status === 'success' ? 'success' : 'error');
                    if (res.status === 'success') {
                        document.getElementById('newActivityName').value = '';
                        loadActivities();
                    }
                })
                .withFailureHandler(function (err) {
                    setLoading('btnCreateActivity', false);
                    showMsg('activityMsg', '系統錯誤：' + err.message, 'error');
                })
                .apiCreateActivity(State.password, name);
        }

        function switchActivity(activityId) {
            if (!confirm('確定要切換至活動「' + activityId + '」嗎？\n\n前台學員下次登入將讀取新活動的題目。')) return;
            google.script.run
                .withSuccessHandler(function (res) {
                    showMsg('activityMsg', res.message, res.status === 'success' ? 'success' : 'error');
                    if (res.status === 'success') loadActivities();
                })
                .withFailureHandler(function (err) {
                    showMsg('activityMsg', '切換失敗：' + err.message, 'error');
                })
                .apiSwitchActivity(State.password, activityId);
        }

        function loadStages() {
            google.script.run
                .withSuccessHandler(res => {
                    const select = document.getElementById('cmsStageSelect');
                    select.innerHTML = '';
                    if (res.status === 'success') {
                        res.stages.forEach(s => {
                            const opt = new Option(s, s);
                            select.add(opt);
                        });
                        select.add(new Option('➕ 新增階段...', '__new__'));
                    }
                })
                .apiGetStages(State.password);
        }

        // Toggle New Stage Input
        document.getElementById('cmsStageSelect').addEventListener('change', (e) => {
            const newStageInput = document.getElementById('cmsNewStage');
            newStageInput.style.display = e.target.value === '__new__' ? 'block' : 'none';
        });

        // CMS Add Question
        document.getElementById('btnAddQ').addEventListener('click', () => {
            const select = document.getElementById('cmsStageSelect');
            const data = {
                label: select.value === '__new__' ? document.getElementById('cmsNewStage').value : select.value,
                question: document.getElementById('cmsQTitle').value,
                type: document.getElementById('cmsQType').value,
                score: document.getElementById('cmsQScore').value,
                answer: document.getElementById('cmsQAns').value
            };

            setLoading('btnAddQ', true);
            google.script.run
                .withSuccessHandler(res => {
                    setLoading('btnAddQ', false);
                    if (res.status === 'success') {
                        alert('✅ 題目已同步至試算表！');
                        document.getElementById('cmsQTitle').value = '';
                    }
                })
                .apiAddQuestion(State.password, data);
        });

        function loadManual() {
            google.script.run
                .withSuccessHandler(res => {
                    document.getElementById('manualContent').innerHTML = res.content.replace(/\n/g, '<br>');
                })
                .apiGetManual(State.password, 'basic');
        }

        function runDiagnostic() {
            const log = document.getElementById('diagnosticLog');
            log.style.display = 'block';
            log.innerHTML = '> 啟動系統診斷服務...<br>';

            google.script.run
                .withSuccessHandler(res => {
                    if (res.status === 'success') {
                        log.innerHTML += `> 試算表 ID: ${res.data.spreadsheetId}<br>`;
                        log.innerHTML += `> Gemini API Key: ${res.data.hasApiKey ? '✅ 已配置' : '❌ 未配置'}<br>`;
                        log.innerHTML += `> 目前版本: ${res.data.version}<br>`;
                        log.innerHTML += `> 時區: ${res.data.timezone}<br>`;
                        log.innerHTML += `> [OK] 系統運行正常。`;
                    }
                })
                .apiGetSystemStatus(State.password);
        }

        function clearCache() {
            if (!confirm('確定要清除伺服器端的快取嗎？這會導致下次讀取變慢，但能解決同步問題。')) return;
            google.script.run
                .withSuccessHandler(res => alert(res.message))
                .apiClearCache(State.password);
        }

        function setLoading(id, loading) {
            const btn = document.getElementById(id);
            if (loading) {
                btn.dataset.old = btn.innerText;
                btn.innerText = '處理中...';
                btn.disabled = true;
            } else {
                btn.innerText = btn.dataset.old;
                btn.disabled = false;
            }
        }

        function showMsg(id, txt, type) {
            const el = document.getElementById(id);
            el.innerText = txt;
            el.className = 'message ' + type;
            el.style.display = 'block';
        }
    </script>
</body>
